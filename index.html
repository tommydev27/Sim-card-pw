<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIM Generator - Tommy Web V0.1.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Font Awesome Free 6 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
body {
    font-family: normal;
    background: #181818;
    display: flex;
    justify-content: center;
    padding: 0; 
    margin: 0;
}
.container {
    margin: 0 auto;
    padding: 0 10px;
    max-width: 330px;
    width: 100%;
    box-sizing: border-box;
}
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
}
.app-title {
    font-weight: 900;
    font-size: 12px;
    color: #bbb;
}

#simCardDisplay {
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
    background: #fff;
    position: relative;
    border: 1px solid #e43030; 
    box-sizing: border-box;
    width: 310px; /* Lebar statis kartu agar presisi saat download */
}

.sim-header {
    background: #e43030;
    color: #fff;
    padding: 8px 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    position: relative;
}
.country-name {
    font-size: 20px;
    letter-spacing: 2px; 
}
.driving-licence {
    font-size: 10px;
    position: absolute;
    right: 8px;
    top: 60%;
    transform: translateY(-50%);
    font-weight: normal;
}
.sim-type {
    display: block;
    text-align: center;
    color: #222;
    font-weight: bold;
    font-size: 11px;
    margin-top: 5px;
}
.sim-content {
    padding: 5px 12px;
    min-height: 150px;
    background: #fff;
    position: relative;
    box-sizing: border-box;
}
.logo-and-number {
    display: flex;
    align-items: center;
    justify-content: flex-end; 
    margin-top: 0px;
    position: relative;
    height: 18px;
}
.police-logo {
    width: 50px; 
    height: 50px;
    border-radius: 50%;
    border: solid 2px #e43030; 
    background-image: url("https://i.postimg.cc/J7xJ6wkc/20251212-124511.jpg"); 
    background-size: cover;
    background-position: center;
    position: absolute;
    left: 5px;
    top: -60px;
    z-index: 10;
}
.licence-number {
    font-size: 13px;
    font-weight: bold;
    color: #000;
    margin-right: 8px;
}
.licence-category {
    background: #e43030;
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 16px;
}

#iconSim {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 28px;
    height: 28px;
    border: 2px solid #e43030;
    border-radius: 6px;
    background-color: #fff;
    font-size: 14px;
    margin-left: 5px;
    box-sizing: border-box;
}

.sim-details {
    display: flex;
    margin-top: 10px;
    align-items: flex-start;
}
.photo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-right: 8px;
    cursor: pointer;
    flex-shrink: 0;
}
.photo-container:hover .main-photo {
    border-color: #e43030;
}
.main-photo {
    width: 75px; 
    height: 100px;
    background: #eee;
    border: 1px solid #aaa;
    margin-bottom: 5px;
    display: block;
    object-fit: cover;
}
.signature-line {
    width: 65px;
    margin-top: 5px;
    height: 10px;
}

/* Solusi pembatas teks panjang */
.data-list {
    width: 140px; /* Mengunci lebar kolom teks agar tidak mendorong elemen kanan */
    flex-shrink: 0;
    font-size: 9px; 
    line-height: 1.4;
    color: #000;
}
.data-list p {
    margin: 2px 0;
    font-size: 9px;
    display: flex;
    overflow: hidden; 
    white-space: nowrap; 
}
.data-list span {
    font-weight: bold;
    margin-left: 4px;
    padding-right: 5px;
    flex-grow: 1;
    overflow: hidden;
    text-overflow: ellipsis; /* Menambahkan titik tiga jika teks melewati batas */
    white-space: nowrap;
}

.side-info {
    text-align: center;
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 55px;
    flex-shrink: 0;
}
.small-photo {
    width: 42px;
    height: 55px;
    background: #eee;
    border: 1px solid #aaa;
    display: block;
    object-fit: cover;
    margin-bottom: 5px;
    opacity: 0.7;
}
#tanggalBerlaku {
    font-size: 8px;
    display: block;
    font-weight: bold;
    color: #e43030;
    margin-top: 5px;
    line-height: 1.1;
}

/* Memastikan teks yang diedit tetap rapi */
[contenteditable="true"] {
    outline: none;
}
[contenteditable="true"]:focus {
    background: #fff8f8;
    border-bottom: 1px solid #e43030;
}

.control-panel {
    color: #fff;
    margin-top: 15px;
}
.control-panel label {
    display: block;
    font-size: 12px;
    margin-bottom: 8px;
    font-weight: bold;
    color: #eee;
}
#iconOptions button {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
}
#iconOptions button:hover {
    background: #e43030;
    border-color: #e43030;
}
.download-btn {
    background: #e43030;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 5px;
    width: 100%;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    margin-top: 20px;
    transition: background 0.3s;
}
.download-btn:hover {
    background: #c02c2c;
}

</style>
</head>
<body>
<div class="container">
    <header>
        <span class="app-title">edit id</span>
    </header>

    <!-- KARTU SIM -->
    <div id="simCardDisplay">
        <div class="sim-header">
            <span class="country-name">INDONESIA</span>
            <span class="driving-licence">DRIVING LICENCE</span>
        </div>
        <span class="sim-type">SURAT IJIN MENGEMUDI</span>
        <div class="sim-content">

            <!-- Logo + Nomor + Golongan + Ikon SIM -->
            <div class="logo-and-number">
                <div class="police-logo"></div>
                <span id="nomorSim" class="licence-number" contenteditable="true">0035-0544-06327</span>
                <span id="golonganSim" class="licence-category" contenteditable="true">C</span>
                <span id="iconSim"><i class="fas fa-motorcycle"></i></span>
            </div>

            <div class="sim-details">
                <!-- Foto SIM (Klik untuk ganti gambar) -->
                <div class="photo-container" onclick="triggerPhotoUpload()" title="Klik untuk ubah foto">
                    <img id="mainPhotoImg" class="main-photo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='105' viewBox='0 0 80 105'><rect width='80' height='105' fill='%23eee'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-size='10' fill='%23999'>KLIK FOTO</text></svg>" alt="Foto Utama">
                    <div class="signature-line"></div>
                </div>
                <input type="file" id="hiddenFileInput" accept="image/*" onchange="previewImage(event)" style="display: none;">

                <!-- Data SIM (Lebar dikunci otomatis terpotong titik-titik jika kepanjangan) -->
                <div class="data-list">
                    <p>Nama: <span id="namaLengkap" contenteditable="true">TOMMY</span></p>
                    <p>Alamat: <span id="alamatLengkap" contenteditable="true">JAKARTA</span></p>
                    <p>TTL: <span id="tempatTglLahir" contenteditable="true">JAKARTA, 20-01-1999</span></p>
                    <p>Jenis Kelamin: <span id="jenisKelamin" contenteditable="true">PRIA</span></p>
                    <p>Tinggi: <span id="tinggiBadanSim" contenteditable="true">170 cm</span></p>
                    <p>Pekerjaan: <span id="pekerjaanSim" contenteditable="true">SWASTA</span></p>
                    <p>Domisili: <span id="domisiliSim" contenteditable="true">KOTAMADYA JAKARTA BARAT</span></p>
                </div>

                <!-- Info samping (Foto kecil aman tidak akan bergeser) -->
                <div class="side-info">
                    <img id="smallPhotoImg" class="small-photo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='45' height='60' viewBox='0 0 45 60'><rect width='45' height='60' fill='%23eee'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-size='6' fill='%23999'>FOTO</text></svg>" alt="Foto Kecil">
                    <span id="tanggalBerlaku" contenteditable="true">Tgl. Berlaku:<br>01/02/2029</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Panel Kontrol -->
    <div class="control-panel">
        <div class="form-group">
            <label>Ganti Ikon Kendaraan:</label>
            <div id="iconOptions" style="display: flex; flex-wrap: wrap; gap: 6px;">
                <button type="button" onclick="setIcon('car')"><i class="fas fa-car"></i></button>
                <button type="button" onclick="setIcon('truck')"><i class="fas fa-truck"></i></button>
                <button type="button" onclick="setIcon('motorcycle')"><i class="fas fa-motorcycle"></i></button>
                <button type="button" onclick="setIcon('wheelchair')"><i class="fas fa-wheelchair"></i></button>
                <button type="button" onclick="setIcon('id-card')"><i class="fas fa-id-card"></i></button>
            </div>
        </div>

        <button class="download-btn" onclick="downloadSim()">Download SIM Card</button>
        
    </div>
</div>

<script>
function setIcon(type) {
    const iconSim = document.getElementById('iconSim');
    let icon = '';
    switch(type) {
        case 'car': icon = 'fa-car'; break;
        case 'truck': icon = 'fa-truck'; break;
        case 'motorcycle': icon = 'fa-motorcycle'; break;
        case 'wheelchair': icon = 'fa-wheelchair'; break;
        case 'id-card': icon = 'fa-id-card'; break;
    }
    iconSim.innerHTML = `<i class="fas ${icon}"></i>`;
}

function triggerPhotoUpload() {
    document.getElementById('hiddenFileInput').click();
}

function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('mainPhotoImg').src = e.target.result;
        document.getElementById('smallPhotoImg').src = e.target.result;
    };
    reader.readAsDataURL(file);
}

document.querySelectorAll('[contenteditable="true"]').forEach(element => {
    element.addEventListener('blur', function() {
        if(this.id !== 'tanggalBerlaku' && this.id !== 'nomorSim') {
            this.textContent = this.textContent.toUpperCase();
        }
    });
});

function downloadSim() {
    const element = document.getElementById('simCardDisplay');
    const images = element.querySelectorAll('img');

    const loadPromises = Array.from(images).map(img => new Promise(resolve => {
        if (img.complete) resolve();
        else img.onload = img.onerror = resolve;
    }));

    Promise.all(loadPromises).then(() => {
        setTimeout(() => {
            html2canvas(element, {
                scale: 3,
                useCORS: true,
                backgroundColor: '#ffffff',
                allowTaint: false
            }).then(canvas => {
                canvas.toBlob(function(blob) {
                    if (!blob) return alert('Gagal memproses gambar.');
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'SIM_Card_TommyWeb.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                }, 'image/png');
            }).catch(err => {
                console.error(err);
                alert('Gagal mengunduh gambar.');
            });
        }, 150);
    });
}
</script>
</body>
</html>
